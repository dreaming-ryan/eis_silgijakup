<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>산업안전기사 실기 — 작업형 랜덤 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --c-bg:#F6F4F0;--c-surface:#FFFFFF;--c-border:#E6E2D8;--c-border2:#D4CEBC;
  --c-text:#1C1A16;--c-text2:#6B6456;--c-text3:#A09589;
  --c-accent:#c05e1a;--c-accent-l:#fdf0e8;
  --c-tag-law:#1A5F9E;--c-tag-law-l:#E4EEF8;
  --c-tag-elec:#1558B0;--c-tag-elec-l:#E4EDF9;
  --c-tag-mach:#1A3F6F;--c-tag-mach-l:#E4EBF5;
  --c-tag-con:#7A5200;--c-tag-con-l:#FEF3E2;
  --c-tag-prot:#0F6E56;--c-tag-prot-l:#E3F4EE;
  --r:10px;--r-sm:6px;--shadow:0 2px 12px rgba(28,26,22,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Noto Sans KR",sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.7;min-height:100vh}
.site-header{background:var(--c-surface);border-bottom:1.5px solid var(--c-border);padding:0 1.5rem;position:sticky;top:0;z-index:100}
.header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:var(--c-text);text-decoration:none}
.logo-badge{background:var(--c-accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 8px;border-radius:20px}
.header-back{font-size:13px;color:var(--c-text2);text-decoration:none;display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--r-sm);transition:background .15s,color .15s}
.header-back:hover{background:var(--c-accent-l);color:var(--c-accent)}
.main-wrap{max-width:800px;margin:0 auto;padding:2rem 1.5rem 4rem}
.ctrl-panel{background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;box-shadow:var(--shadow)}
.ctrl-group{display:flex;flex-direction:column;gap:6px}
.ctrl-label{font-size:11px;font-weight:700;color:var(--c-text3);letter-spacing:.08em;text-transform:uppercase}
.filter-tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--c-bg);border:1.5px solid var(--c-border2);color:var(--c-text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.tag:hover{border-color:var(--c-accent);color:var(--c-accent);background:var(--c-accent-l)}
.tag.active{background:var(--c-accent);border-color:var(--c-accent);color:#fff}
.ctrl-sep{width:1px;background:var(--c-border);align-self:stretch}
.progress-bar-wrap{background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r);padding:1rem 1.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:13px;font-weight:600;color:var(--c-text2)}
.progress-count{font-size:20px;font-weight:700;color:var(--c-accent)}
.progress-count span{font-size:13px;font-weight:400;color:var(--c-text3)}
.progress-track{height:6px;background:var(--c-border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--c-accent);border-radius:3px;transition:width .4s ease}
.stat-row{margin-top:8px}
.stat-badge{font-size:12px;font-weight:500;color:var(--c-text3);background:var(--c-bg);padding:3px 10px;border-radius:20px;border:1px solid var(--c-border)}
.pdf-btn-wrap{display:flex;justify-content:center;margin-bottom:1.2rem}
.pdf-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border-radius:50px;background:linear-gradient(135deg,#c05e1a 0%,#9e4a12 100%);color:#fff;font-size:15px;font-weight:700;text-decoration:none;letter-spacing:-.02em;box-shadow:0 4px 18px rgba(192,94,26,.38);transition:all .22s ease;white-space:nowrap}
.pdf-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(192,94,26,.50);filter:brightness(1.07)}
.pdf-btn:active{transform:translateY(0);box-shadow:0 3px 10px rgba(192,94,26,.30)}
.pdf-btn-icon{font-size:18px;line-height:1;flex-shrink:0}
.quiz-card{background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s}
.quiz-card:hover{box-shadow:0 4px 24px rgba(28,26,22,.11)}
.card-meta{display:flex;align-items:center;gap:8px;padding:12px 1.5rem 0;flex-wrap:wrap}
.meta-year{font-size:12px;font-weight:700;color:var(--c-text3)}
.meta-round{font-size:11px;color:var(--c-text3);background:var(--c-bg);padding:2px 8px;border-radius:4px;border:1px solid var(--c-border)}
.cat-tag{display:inline-block;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.03em}
.cat-law{background:var(--c-tag-law-l);color:var(--c-tag-law)}
.cat-elec{background:var(--c-tag-elec-l);color:var(--c-tag-elec)}
.cat-mach{background:var(--c-tag-mach-l);color:var(--c-tag-mach)}
.cat-con{background:var(--c-tag-con-l);color:var(--c-tag-con)}
.cat-prot{background:var(--c-tag-prot-l);color:var(--c-tag-prot)}
.card-body{padding:1.25rem 1.5rem 0}
.q-text{font-size:15px;line-height:1.8;color:var(--c-text)}
.q-box{background:var(--c-bg);border:1px solid var(--c-border);border-radius:var(--r-sm);padding:12px 14px;margin-top:8px;font-size:14px;line-height:1.75}
.q-scene{background:#f2f0ec;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px;color:var(--c-text2);line-height:1.7}
.q-scene-label{font-size:10px;font-weight:700;color:var(--c-text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.q-scene-img img{max-width:100%;border-radius:6px}
.ans-wrap{border-top:1.5px dashed var(--c-border);overflow:hidden;max-height:0;transition:max-height .4s ease}
.ans-wrap.open{max-height:10000px}
.ans-body{padding:1.25rem 1.5rem}
.answer-val{font-size:16px;font-weight:700;color:var(--c-accent);line-height:1.6;margin-bottom:1rem}
.ans-seg{color:#1d6fcc;font-weight:500}
.keyword-detail{font-size:13px;color:var(--c-text2);line-height:1.7;margin-bottom:8px}
.law-ref-wrap{margin-top:14px;border:1.5px solid #BDD0B7;border-radius:8px;overflow:hidden}
.law-ref-header{background:#E5F2E7;padding:9px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.law-ref-badge{background:#2D7A3A;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.law-ref-title{font-size:12px;font-weight:600;color:#1C3A20;flex:1}
.law-ref-toggle{font-size:11px;color:#4A7A52;font-weight:500;white-space:nowrap}
.law-ref-body{background:#f8fbf8;padding:12px 16px;display:none}
.law-ref-body.open{display:block}
.law-article{margin-bottom:12px}
.law-article:last-child{margin-bottom:0}
.law-article-title{font-size:12.5px;font-weight:700;color:#3A5A3E;margin-bottom:4px}
.law-article-source{font-size:11px;font-weight:700;color:#2D7A3A;margin-bottom:4px}
.law-article-text{font-size:12px;color:#3A5A3E;line-height:1.75}
.btn-close-ans{display:block;width:100%;margin-top:12px;background:var(--c-bg);border:1.5px solid var(--c-border);color:var(--c-text3);border-radius:var(--r-sm);padding:8px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-close-ans:hover{background:var(--c-accent-l);color:var(--c-accent);border-color:var(--c-accent)}
.card-actions{padding:0 1.5rem 1.25rem;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:1.25rem}
.btn-reveal{flex:0 0 auto;background:var(--c-accent);color:#fff;border:none;border-radius:var(--r-sm);padding:10px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-reveal:hover{background:#9e4a12;transform:translateY(-1px)}
.btn-reveal.revealed{background:var(--c-bg);color:var(--c-text3);border:1.5px solid var(--c-border)}
.btn-next{background:var(--c-surface);border:1.5px solid var(--c-accent);color:var(--c-accent);border-radius:var(--r-sm);padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-next:hover{background:var(--c-accent-l);transform:translateY(-1px)}
.btn-skip{background:var(--c-surface);border:1.5px solid var(--c-border2);color:var(--c-text3);border-radius:var(--r-sm);padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-skip:hover{background:var(--c-bg)}
.done-card{display:none;text-align:center;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r);padding:3rem 2rem;box-shadow:var(--shadow)}
.done-card.show{display:block}
.done-emoji{font-size:48px;margin-bottom:1rem}
.done-title{font-size:22px;font-weight:700;margin-bottom:.5rem}
.done-desc{font-size:14px;color:var(--c-text2);margin-bottom:1.5rem;white-space:pre-line}
.btn-restart{background:var(--c-accent);color:#fff;border:none;border-radius:var(--r-sm);padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-restart:hover{background:#9e4a12;transform:translateY(-1px)}
.empty-msg{display:none;text-align:center;padding:3rem 2rem;font-size:14px;color:var(--c-text3);background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r);box-shadow:var(--shadow)}
.empty-msg.show{display:block}
@media(max-width:600px){.ctrl-panel{flex-direction:column}.ctrl-sep{width:100%;height:1px}}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <span class="logo-badge">🦺</span>
      산업안전기사 실기 작업형
    </a>
    <a href="index.html" class="header-back">← 홈으로</a>
  </div>
</header>
<main class="main-wrap">
  <div class="ctrl-panel">
    <div class="ctrl-group">
      <div class="ctrl-label">연도 필터</div>
      <div class="filter-tags" id="filter-year">
        <span class="tag active" onclick="setYear('all',this)">전체</span>
        <span class="tag" onclick="setYear('2025',this)">2025</span>
        <span class="tag" onclick="setYear('2024',this)">2024</span>
        <span class="tag" onclick="setYear('2023',this)">2023</span>
        <span class="tag" onclick="setYear('2022',this)">2022</span>
        <span class="tag" onclick="setYear('2021',this)">2021</span>
        <span class="tag" onclick="setYear('2020',this)">2020</span>
      </div>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
      <div class="ctrl-label">카테고리 필터</div>
      <div class="filter-tags" id="filter-cat">
        <span class="tag active" onclick="setCat('all',this)">전체</span>
        <span class="tag" onclick="setCat('산업안전보건법',this)">안전보건법</span>
        <span class="tag" onclick="setCat('전기·화학 안전',this)">전기·화학</span>
        <span class="tag" onclick="setCat('기계·설비 안전',this)">기계·설비</span>
        <span class="tag" onclick="setCat('건설공사 안전',this)">건설공사</span>
        <span class="tag" onclick="setCat('보호구',this)">보호구</span>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-row">
      <div class="progress-label">학습 진행</div>
      <div class="progress-count"><span id="cnt-done">0</span> / <span id="cnt-total">0</span> <span>문제</span></div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="stat-row">
      <span class="stat-badge" id="stat-pool">총 0문제</span>
    </div>
  </div>
  <div class="pdf-btn-wrap">
    <a class="pdf-btn"
       href="https://dreaming-ryan.com/home?product=%EC%82%B0%EC%97%85%EC%95%88%EC%A0%84%EA%B8%B0%EC%82%AC%20%EC%9A%94%EC%95%BD%EB%85%B8%ED%8A%B8%20PDF%20(%EC%8B%A4%EA%B8%B0)"
       target="_blank" rel="noopener noreferrer">
      <span class="pdf-btn-icon">📙</span>
      <span style="display:flex;flex-direction:column;align-items:flex-start;gap:2px">
        <span>산안기 실기 작업형 요약노트 PDF</span>
        <span style="font-size:13px;font-weight:500;opacity:.9">무료 샘플 받기</span>
      </span>
    </a>
  </div>
  <div id="quiz-area"></div>
  <div class="done-card" id="done-card">
    <div class="done-emoji">🎉</div>
    <div class="done-title">모든 문제를 완료했습니다!</div>
    <div class="done-desc" id="done-desc">선택한 조건의 모든 작업형 기출문제를 풀었습니다.\n다시 풀어보며 실력을 다져보세요.</div>
    <button class="btn-restart" onclick="restart()">다시 풀기</button>
  </div>
  <div class="empty-msg" id="empty-msg">
    <div style="font-size:32px;margin-bottom:12px">🔍</div>
    선택한 조건에 해당하는 문제가 없습니다.<br>필터를 변경해 주세요.
  </div>
</main>
<script src="jakup_stats.js"></script>
<script>
let curYear = 'all';
let curCat  = 'all';
let pool    = [];
let cursor  = 0;
let questions = [];

fetch('jakup_quiz.html')
  .then(r => r.text())
  .then(html => {
    const m = html.match(/const questions\s*=\s*(\[[\s\S]*?\]);\s*\n/);
    if (!m) { console.error('questions 배열 추출 실패'); return; }
    questions = (new Function('return ' + m[1]))();
    rebuildPool();
  })
  .catch(e => console.error('fetch 오류:', e));

const catClass = {
  '산업안전보건법':'cat-law',
  '기계·설비 안전':'cat-mach',
  '전기·화학 안전':'cat-elec',
  '건설공사 안전':'cat-con',
  '보호구':'cat-prot'
};

function setYear(v, el) {
  curYear = v;
  document.querySelectorAll('#filter-year .tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  rebuildPool();
}
function setCat(v, el) {
  curCat = v;
  document.querySelectorAll('#filter-cat .tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  rebuildPool();
}

function rebuildPool() {
  const filtered = questions.filter(q => {
    const yOk = curYear === 'all' || q.year === curYear;
    const cOk = curCat  === 'all' || q.cat  === curCat;
    return yOk && cOk;
  });
  const arr = filtered.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  pool   = arr;
  cursor = 0;
  updateProgress();
  showQuestion();
}

function updateProgress() {
  const total = pool.length;
  const done  = cursor;
  document.getElementById('cnt-done').textContent  = done;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('stat-pool').textContent = '총 ' + total + '문제';
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showQuestion() {
  const area     = document.getElementById('quiz-area');
  const doneCard = document.getElementById('done-card');
  const emptyMsg = document.getElementById('empty-msg');
  doneCard.classList.remove('show');
  emptyMsg.classList.remove('show');
  area.innerHTML = '';

  if (pool.length === 0) { emptyMsg.classList.add('show'); return; }
  if (cursor >= pool.length) {
    document.getElementById('done-desc').textContent =
      '작업형 기출문제 ' + pool.length + '문제를 모두 풀었습니다!\n다시 풀어보며 실력을 다져보세요.';
    doneCard.classList.add('show');
    return;
  }

  const q  = pool[cursor];
  const cc = catClass[q.cat] || '';

  const card = document.createElement('div');
  card.className = 'quiz-card';
  card.innerHTML =
    '<div class="card-meta">' +
      '<span class="meta-year">' + q.year + '년</span>' +
      '<span class="meta-round">' + q.round + '</span>' +
      '<span class="cat-tag ' + cc + '">' + q.cat + '</span>' +
      '<span style="margin-left:auto;font-size:11px;color:var(--c-text3)">Q' + (cursor+1) + ' / ' + pool.length + '</span>' +
    '</div>' +
    '<div class="card-body">' + q.qHtml + '</div>' +
    '<div class="card-actions" id="card-actions">' +
      '<button class="btn-skip" id="btn-skip" onclick="skip()">건너뛰기</button>' +
      '<button class="btn-reveal" id="btn-reveal" onclick="reveal()">정답 보기</button>' +
    '</div>' +
    '<div class="ans-wrap" id="ans-wrap">' +
      '<div class="ans-body">' + q.ansHtml +
        '<button class="btn-close-ans" onclick="closeAns()">▲ 정답 닫기</button>' +
      '</div>' +
    '</div>';
  area.appendChild(card);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reveal() {
  document.getElementById('ans-wrap').classList.add('open');
  const btn  = document.getElementById('btn-reveal');
  const skip = document.getElementById('btn-skip');
  btn.textContent = '다음 문제';
  btn.classList.add('revealed');
  btn.onclick = next;
  if (skip) skip.style.display = 'none';
}

function closeAns() {
  document.getElementById('ans-wrap').classList.remove('open');
  const btn  = document.getElementById('btn-reveal');
  const skip = document.getElementById('btn-skip');
  btn.textContent = '정답 보기';
  btn.classList.remove('revealed');
  btn.onclick = reveal;
  if (skip) skip.style.display = '';
}

function next() { cursor++; updateProgress(); showQuestion(); }

function skip() {
  const cur = pool.splice(cursor, 1)[0];
  pool.push(cur);
  showQuestion();
}

function restart() { rebuildPool(); }
</script>
</body>
</html>
